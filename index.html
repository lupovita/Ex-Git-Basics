<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
    <script src="js/util.js" defer></script>
    <title>The Ball Game</title>
</head>

<body onload="onInit()">
    <h1>The Ball Game</h1>

    <div class="ball ball1" onclick="onBallClick(this, 400)">100</div>
    <div class="ball ball2" onclick="onBallClick(this, 250)">100</div>
    <div class="ball ball3" onclick="onSwap()">Swap Colors</div>
    <div class="ball ball4" onclick="onReduceDiameter()">Reduce Diameters</div>
    <div class="ball ball5" onclick="onChangeBgColor()">Change Page Color</div>
    <div class="ball ball6" onclick="onInit()" onpointerenter="onBallEnter()"
        onpointerleave="onBallLeave()">Reset</div>

</body>

</html>
